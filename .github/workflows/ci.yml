name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          git \
          curl \
          unzip \
          build-essential \
          cmake

      - name: Check formatting
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Verify config loads
        run: |
          export XDG_CONFIG_HOME="$PWD/.ci"
          mkdir -p "$XDG_CONFIG_HOME"
          ln -s "$PWD" "$XDG_CONFIG_HOME/nvim"

          set -o pipefail
          nvim --headless -c "qa" 2>&1 | tee nvim.log

          ! grep -E "E[0-9]{4}:|Error in " nvim.log
